<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetID - Meus Pets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes pulse-shadow {
            0%, 100% { box-shadow: 0 20px 25px -5px rgba(139, 92, 246, 0.3), 0 10px 10px -5px rgba(59, 130, 246, 0.2); }
            50% { box-shadow: 0 25px 30px -5px rgba(139, 92, 246, 0.4), 0 15px 15px -5px rgba(59, 130, 246, 0.3); }
        }
        #fabAddPet {
            animation: pulse-shadow 2s ease-in-out infinite;
        }
        .shadow-3xl {
            box-shadow: 0 30px 40px -5px rgba(139, 92, 246, 0.5), 0 20px 20px -5px rgba(59, 130, 246, 0.3);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-50 to-blue-50 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm border-b">
        <div class="max-w-6xl mx-auto px-3 sm:px-4 py-3 sm:py-4">
            <div class="flex items-center justify-between flex-wrap gap-2">
                <div class="flex items-center space-x-2 sm:space-x-3">
                    <img src="../assets/logo/logo.jpg" alt="PetID" class="w-8 h-8 sm:w-10 sm:h-10 rounded-md">
                    <span class="font-bold text-purple-900 text-base sm:text-lg">PetID</span>
                </div>
                <div class="flex items-center gap-2 sm:gap-3">
                    <div id="networkInfo" class="hidden sm:flex text-xs sm:text-sm text-gray-600 bg-gray-100 px-2 sm:px-3 py-1.5 sm:py-2 rounded-lg">
                        <span class="font-semibold">Rede:</span> <span id="networkName" class="ml-1">-</span>
                    </div>
                    <div id="mintStatus" class="hidden text-xs sm:text-sm text-gray-600 bg-blue-50 px-2 sm:px-3 py-1.5 sm:py-2 rounded-lg border border-blue-200">
                        <span class="font-semibold">Pets:</span> <span id="mintCount" class="ml-1">-</span>
                    </div>
                    <button 
                        id="walletBtn" 
                        class="bg-purple-100 text-purple-800 px-2 sm:px-4 py-1.5 sm:py-2 rounded-lg font-mono text-xs sm:text-sm hover:bg-purple-200 transition cursor-pointer max-w-[180px] sm:max-w-none truncate"
                        onclick="toggleWalletConnection()"
                    >
                        Conectando...
                    </button>
                </div>
            </div>
        </div>
    </header>

    <div class="max-w-6xl mx-auto px-3 sm:px-4 py-4 sm:py-8 pb-24">
        <!-- My Pets -->
        <div class="bg-white rounded-xl shadow-lg p-4 sm:p-6 mb-4 sm:mb-6">
            <div class="flex items-center justify-between mb-4 sm:mb-6 gap-2">
                <h2 class="text-xl sm:text-2xl font-bold text-purple-900 flex items-center">
                    <span class="mr-2 sm:mr-3">🐕</span> <span class="leading-tight">Meus Pets</span>
                </h2>
                <button id="loadPetsBtn" class="bg-indigo-600 text-white px-3 sm:px-6 py-2 rounded-lg hover:bg-indigo-700 transition font-semibold text-sm sm:text-base whitespace-nowrap">
                    <span class="hidden sm:inline">🔄 Atualizar</span>
                    <span class="sm:hidden">🔄</span>
                </button>
            </div>
            <div id="petsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>

        <!-- Register Pet (Hidden by default) -->
        <div id="registerPetSection" class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden items-center justify-center p-4" onclick="if(event.target === this) closeRegisterForm()">
            <div class="bg-white rounded-xl shadow-2xl p-4 sm:p-6 max-w-3xl w-full max-h-[90vh] overflow-y-auto">
                <div class="flex items-center justify-between mb-4 sm:mb-6">
                    <h2 class="text-xl sm:text-2xl font-bold flex items-center text-purple-900">
                        <span class="mr-2 sm:mr-3 text-2xl">🐾</span> <span class="leading-tight">Registrar Novo Pet</span>
                    </h2>
                    <button onclick="closeRegisterForm()" class="text-gray-500 hover:text-gray-700 text-2xl leading-none">
                        ✕
                    </button>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Nome do Pet *</label>
                        <input 
                            id="petName" 
                            type="text" 
                            placeholder="Ex: Rex, Mimi..." 
                            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                        />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Espécie *</label>
                        <input 
                            id="petSpecies" 
                            type="text" 
                            placeholder="Ex: Cachorro, Gato..." 
                            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                        />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Raça *</label>
                        <input 
                            id="petBreed" 
                            type="text" 
                            placeholder="Ex: Labrador, Persa, SRD..." 
                            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                        />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Cor *</label>
                        <input 
                            id="petColor" 
                            type="text" 
                            placeholder="Ex: Marrom, Preto..." 
                            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                        />
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Data de Nascimento</label>
                        <input 
                            id="petBirthDate" 
                            type="date" 
                            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                        />
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-gray-700 mb-2">Foto do Pet *</label>
                        <input 
                            id="petImage" 
                            type="file" 
                            accept="image/*" 
                            class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                        />
                        <p class="text-xs text-gray-500 mt-1">JPG, PNG, GIF ou WebP (máx. 10MB)</p>
                    </div>
                    <div id="petPreview" class="md:col-span-2 hidden">
                        <img id="petPreviewImg" src="" alt="Preview" class="max-w-full sm:max-w-xs rounded-lg border-2 border-purple-200 mx-auto" />
                    </div>
                </div>
                <button id="registerBtn" class="mt-4 sm:mt-6 w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white px-4 sm:px-6 py-3 sm:py-4 rounded-lg hover:from-purple-700 hover:to-blue-700 font-bold text-base sm:text-lg transition">
                    🚀 Registrar Pet
                </button>
                <p id="registerResult" class="mt-3 sm:mt-4 text-sm text-center"></p>
            </div>
        </div>

        <!-- Floating Action Button -->
        <button 
            id="fabAddPet" 
            onclick="openRegisterForm()"
            class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gradient-to-r from-purple-600 to-blue-600 text-white w-16 h-16 rounded-full shadow-2xl hover:shadow-3xl hover:scale-110 transition-all duration-300 flex items-center justify-center z-30 group"
            title="Adicionar novo pet"
        >
            <span class="text-3xl font-light group-hover:rotate-90 transition-transform duration-300">+</span>
        </button>
    </div>

    <!-- Pet Card Modal -->
    <div id="petCardModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl max-w-4xl w-full max-h-[90vh] overflow-hidden">
            <div class="sticky top-0 bg-white border-b px-6 py-4 flex items-center justify-between">
                <h3 class="text-xl font-bold text-purple-900">🎫 Carteirinha do Pet</h3>
                <button onclick="closePetCardModal()" class="text-gray-500 hover:text-gray-700 text-2xl">
                    ✕
                </button>
            </div>
            <div id="petCardContent" class="p-6 overflow-y-auto" style="max-height: calc(90vh - 80px);">
                <!-- PDF will be displayed here -->
            </div>
        </div>
    </div>

    <!-- Web3.Storage Login Modal -->
    <!-- Pet Details Modal -->
    <div id="petDetailsModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl max-w-3xl w-full max-h-[90vh] overflow-y-auto">
            <div class="sticky top-0 bg-white border-b px-6 py-4 flex items-center justify-between">
                <h3 class="text-xl font-bold text-purple-900">📋 Detalhes do Pet</h3>
                <button onclick="closePetDetailsModal()" class="text-gray-500 hover:text-gray-700 text-2xl">
                    ✕
                </button>
            </div>
            <div id="petDetailsContent" class="p-6">
                <!-- Content will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Unregister service worker for development -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(registrations => {
                for (let reg of registrations) {
                    reg.unregister().then(() => console.log('Service worker unregistered for development'));
                }
            });
        }
    </script>

    <!-- Load jsPDF for PDF generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <!-- Load ethers.js v5 from CDN -->
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    
    <!-- Load IPFS upload helper -->
    <script src="./public/pinata-upload.js"></script>
    
    <!-- Load contract helper -->
    <script src="./public/contract-helper.js"></script>

    <!-- App logic -->
    <script>
        let wallet = null;
        let isWalletConnected = false;

        // Toggle wallet connection (connect/disconnect)
        async function toggleWalletConnection() {
            if (isWalletConnected) {
                // Disconnect
                disconnectWallet();
            } else {
                // Connect
                try {
                    await init();
                } catch (err) {
                    console.error('Erro ao conectar:', err);
                }
            }
        }

        // Disconnect wallet
        function disconnectWallet() {
            wallet = null;
            isWalletConnected = false;
            
            const walletBtn = document.getElementById('walletBtn');
            if (walletBtn) {
                walletBtn.textContent = '🔒 Conectar Wallet';
                walletBtn.classList.remove('bg-green-100', 'text-green-800');
                walletBtn.classList.add('bg-purple-100', 'text-purple-800');
            }
            
            // Redirect to landing page
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 500);
        }

        // Auto-connect wallet on page load
        async function init() {
            // Auto-connect wallet
            try {
                wallet = await connectWallet();
                isWalletConnected = true;
                
                const walletBtn = document.getElementById('walletBtn');
                if (walletBtn) {
                    walletBtn.innerHTML = `<span class="mr-2"> <span class="ml-2 text-xs">Desconectar</span>`;
                    walletBtn.classList.remove('bg-purple-100', 'text-purple-800');
                    walletBtn.classList.add('bg-green-100', 'text-green-800');
                }
                
                const networkInfoEl = document.getElementById('networkName');
                if (networkInfoEl) {
                    networkInfoEl.textContent = CONTRACT_CONFIG.network.name;
                }
                
                // Show mint status
                try {
                    const mintStatus = await checkUserMintStatus();
                    const mintCountEl = document.getElementById('mintCount');
                    const mintStatusEl = document.getElementById('mintStatus');
                    if (mintCountEl && mintStatusEl) {
                        mintCountEl.textContent = `${mintStatus.used}/${mintStatus.max}`;
                        if (mintStatus.remaining === 0) {
                            mintStatusEl.classList.remove('bg-blue-50', 'border-blue-200');
                            mintStatusEl.classList.add('bg-red-50', 'border-red-300');
                        }
                        mintStatusEl.classList.remove('hidden');
                    }
                } catch (err) {
                    console.log('Não foi possível carregar status de mints:', err);
                }
                
                // Auto-load user's pets after wallet connection
                await loadUserPetsAutomatically();
            } catch (error) {
                console.error('Auto-connect falhou:', error);
                isWalletConnected = false;
                
                const walletBtn = document.getElementById('walletBtn');
                if (walletBtn) {
                    walletBtn.textContent = '❌ Erro ao conectar';
                    walletBtn.classList.remove('bg-purple-100', 'text-purple-800');
                    walletBtn.classList.add('bg-red-100', 'text-red-800');
                }
                alert('Por favor, conecte sua MetaMask e recarregue a página.');
                // Redirect back to landing page
                setTimeout(() => window.location.href = 'index.html', 2000);
            }
        }

        // Show user's pets to choose which one to delete
        async function showMyPetsToDelete() {
            const resultEl = document.getElementById('registerResult');
            try {
                resultEl.innerHTML = '<p class="text-center py-4">🔄 Carregando seus pets...</p>';
                
                const petIds = await getMyPets();
                
                if (petIds.length === 0) {
                    resultEl.innerHTML = `
                        <div class="bg-gray-50 border rounded-lg p-4">
                            <p class="text-gray-600">Nenhum pet encontrado.</p>
                        </div>
                    `;
                    return;
                }

                let petsHtml = `
                    <div class="bg-orange-50 border-2 border-orange-300 rounded-lg p-4">
                        <h3 class="font-bold text-orange-900 mb-3">🗑️ Escolha um pet para deletar:</h3>
                        <div class="space-y-3">
                `;

                for (const petId of petIds) {
                    try {
                        const details = await getPetDetails(petId);
                        petsHtml += `
                            <div class="bg-white rounded-lg p-3 flex items-center justify-between gap-3">
                                <div class="flex-1">
                                    <p class="font-semibold text-gray-800">${details.name}</p>
                                    <p class="text-xs text-gray-500">Pet ID #${petId} | NFT #${details.nftTokenId}</p>
                                </div>
                                <button 
                                    onclick="deletePet(${details.nftTokenId}, '${details.name}')" 
                                    class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition-colors text-sm whitespace-nowrap">
                                    🗑️ Deletar
                                </button>
                            </div>
                        `;
                    } catch (err) {
                        console.error(`Erro ao carregar pet #${petId}:`, err);
                    }
                }

                petsHtml += `
                        </div>
                        <button onclick="window.location.reload()" class="w-full mt-4 bg-gray-400 text-white px-4 py-2 rounded-lg hover:bg-gray-500 transition-colors">
                            Cancelar
                        </button>
                    </div>
                `;

                resultEl.innerHTML = petsHtml;
            } catch (error) {
                console.error('Erro ao carregar pets:', error);
                resultEl.innerHTML = `
                    <div class="bg-red-50 border rounded-lg p-4">
                        <p class="text-red-800">❌ Erro: ${error.message}</p>
                    </div>
                `;
            }
        }

        // Delete a pet NFT
        async function deletePet(tokenId, petName) {
            if (!confirm(`Tem certeza que deseja deletar "${petName}"? Esta ação é irreversível!`)) {
                return;
            }

            const resultEl = document.getElementById('registerResult');
            try {
                resultEl.innerHTML = `
                    <div class="bg-blue-50 border rounded-lg p-4">
                        <p class="text-blue-700">⏳ Deletando "${petName}"...</p>
                    </div>
                `;

                await burnPetNFT(tokenId);

                resultEl.innerHTML = `
                    <div class="bg-green-50 border-2 border-green-300 rounded-lg p-4">
                        <p class="text-green-800 font-semibold">✅ Pet deletado com sucesso!</p>
                        <p class="text-sm text-green-700 mt-2">Atualizando lista...</p>
                    </div>
                `;
                
                // Reload pets list and close any open modals
                setTimeout(async () => {
                    await loadUserPetsAutomatically();
                    resultEl.innerHTML = '';
                }, 2000);
            } catch (error) {
                console.error('Erro ao deletar:', error);
                resultEl.innerHTML = `
                    <div class="bg-red-50 border-2 border-red-300 rounded-lg p-4">
                        <p class="text-red-800 font-semibold">❌ Erro ao deletar</p>
                        <p class="text-sm text-red-600 mt-2">${error.message}</p>
                    </div>
                `;
            }
        }

        // Load user's pets automatically
        // Open/Close register form
        function openRegisterForm() {
            document.getElementById('registerPetSection').classList.remove('hidden');
            document.getElementById('registerPetSection').classList.add('flex');
        }

        function closeRegisterForm() {
            document.getElementById('registerPetSection').classList.add('hidden');
            document.getElementById('registerPetSection').classList.remove('flex');
        }

        // Load user's pets automatically with cards
        async function loadUserPetsAutomatically() {
            try {
                const petsListEl = document.getElementById('petsList');
                if (!petsListEl) return;
                
                petsListEl.innerHTML = '<div class="col-span-full text-center text-gray-500 py-8">🔄 Carregando seus pets...</div>';
                
                const petIds = await getMyPets();
                
                if (petIds.length === 0) {
                    petsListEl.innerHTML = `
                        <div class="col-span-full text-center py-12">
                            <div class="text-6xl mb-4">🐾</div>
                            <p class="text-gray-500 text-lg mb-2">Você ainda não tem pets registrados.</p>
                            <p class="text-sm text-gray-400 mb-6">Clique no botão + para registrar seu primeiro pet!</p>
                            <button onclick="openRegisterForm()" class="bg-gradient-to-r from-purple-600 to-blue-600 text-white px-6 py-3 rounded-lg hover:from-purple-700 hover:to-blue-700 font-semibold transition">
                                🐾 Adicionar Primeiro Pet
                            </button>
                        </div>
                    `;
                    return;
                }

                // Load details for each pet to create cards
                const petsData = await Promise.all(
                    petIds.map(async (id) => {
                        try {
                            const details = await getPetDetails(id);
                            return { id, ...details };
                        } catch (err) {
                            console.error(`Erro ao carregar pet #${id}:`, err);
                            return { id, error: true };
                        }
                    })
                );

                petsListEl.innerHTML = petsData.map(pet => {
                    if (pet.error) {
                        return `
                            <div class="bg-red-50 border border-red-200 rounded-xl p-4">
                                <p class="text-red-600 text-sm">❌ Erro ao carregar Pet #${pet.id}</p>
                            </div>
                        `;
                    }

                    // Convert IPFS URI to HTTP gateway
                    let imageUrl = pet.imageURI || '';
                    if (imageUrl.startsWith('ipfs://')) {
                        const hash = imageUrl.replace('ipfs://', '');
                        imageUrl = `https://gateway.pinata.cloud/ipfs/${hash}`;
                    }

                    const birthDate = pet.birthDate > 0 
                        ? new Date(pet.birthDate * 1000).toLocaleDateString('pt-BR')
                        : 'N/A';

                    return `
                        <div class="bg-white rounded-xl shadow-lg overflow-hidden hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-1">
                            ${imageUrl ? `
                                <div class="aspect-square overflow-hidden bg-gradient-to-br from-purple-100 to-blue-100">
                                    <img 
                                        src="${imageUrl}" 
                                        alt="${pet.name}" 
                                        class="w-full h-full object-cover"
                                        onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22400%22%3E%3Crect fill=%22%23f3f4f6%22 width=%22400%22 height=%22400%22/%3E%3Ctext fill=%22%239ca3af%22 font-family=%22sans-serif%22 font-size=%2240%22 x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 dy=%22.3em%22%3E🐾%3C/text%3E%3C/svg%3E'"
                                    />
                                </div>
                            ` : `
                                <div class="aspect-square bg-gradient-to-br from-purple-100 to-blue-100 flex items-center justify-center">
                                    <span class="text-6xl">🐾</span>
                                </div>
                            `}
                            <div class="p-4">
                                <h3 class="text-xl font-bold text-purple-900 mb-2">${pet.name}</h3>
                                <div class="space-y-1 text-sm text-gray-600 mb-4">
                                    <p><span class="font-semibold">Espécie:</span> ${pet.species}</p>
                                    <p><span class="font-semibold">Raça:</span> ${pet.breed}</p>
                                    <p><span class="font-semibold">Nascimento:</span> ${birthDate}</p>
                                </div>
                                <div class="flex flex-col gap-2">
                                    <button 
                                        onclick="showPetDetails(${pet.id})" 
                                        class="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white px-4 py-2 rounded-lg hover:from-purple-700 hover:to-blue-700 font-semibold transition text-sm"
                                    >
                                        Ver Detalhes
                                    </button>
                                    <button 
                                        onclick="showPetCard(${pet.id})" 
                                        class="w-full bg-gradient-to-r from-green-600 to-teal-600 text-white px-4 py-2 rounded-lg hover:from-green-700 hover:to-teal-700 font-semibold transition text-sm"
                                    >
                                        🎫 Exibir Carteirinha
                                    </button>
                                </div>
                            </div>
                            <div class="px-4 pb-3 flex items-center justify-between text-xs text-gray-500">
                                <span>Pet ID: #${pet.id}</span>
                                ${pet.nftTokenId ? `<span class="bg-blue-100 text-blue-700 px-2 py-1 rounded">NFT #${pet.nftTokenId}</span>` : ''}
                            </div>
                        </div>
                    `;
                }).join('');
                
                console.log(`✅ ${petIds.length} pet(s) carregado(s) automaticamente`);
            } catch (error) {
                console.error('Erro ao carregar pets automaticamente:', error);
                const petsListEl = document.getElementById('petsList');
                if (petsListEl) {
                    petsListEl.innerHTML = `
                        <div class="col-span-full bg-yellow-50 border border-yellow-200 rounded-lg p-6 text-center">
                            <p class="text-yellow-700 mb-3">⚠️ Erro ao carregar pets.</p>
                            <button onclick="loadUserPetsAutomatically()" class="bg-yellow-600 text-white px-4 py-2 rounded-lg hover:bg-yellow-700 transition">
                                🔄 Tentar Novamente
                            </button>
                        </div>
                    `;
                }
            }
        }

        // Image preview handler
        document.getElementById('petImage').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('petPreviewImg').src = e.target.result;
                    document.getElementById('petPreview').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        // Register Pet (complete flow)
        document.getElementById('registerBtn').addEventListener('click', async () => {
            if (!pinataConfigured) {
                alert('Servidor offline! Execute: npm start');
                return;
            }

            const name = document.getElementById('petName').value.trim();
            const species = document.getElementById('petSpecies').value.trim();
            const breed = document.getElementById('petBreed').value.trim();
            const color = document.getElementById('petColor').value.trim();
            const birthDateInput = document.getElementById('petBirthDate').value;
            const fileInput = document.getElementById('petImage');
            const imageFile = fileInput.files[0];

            if (!name || !species || !breed || !color || !imageFile) {
                alert('Por favor, preencha todos os campos obrigatórios (*)');
                return;
            }

        // Helper function to load image as base64
        async function loadImageAsBase64(url) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.crossOrigin = 'Anonymous';
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    resolve(canvas.toDataURL('image/jpeg'));
                };
                img.onerror = reject;
                img.src = url;
            });
        }
